# ════════════════════════════════════════════════════════════
#  Mosquitto en VPS – Configuración puerto 1883 (sin TLS)
#
# ════════════════════════════════════════════════════════════

# ────────────────────────────────────────────────────────────
# 1. INSTALAR
# ────────────────────────────────────────────────────────────
#   sudo apt update && sudo apt install -y mosquitto mosquitto-clients
#   sudo systemctl enable --now mosquitto

# ────────────────────────────────────────────────────────────
# 2. CREAR USUARIOS
# ────────────────────────────────────────────────────────────
#   sudo mosquitto_passwd -c /etc/mosquitto/passwd esp_extractor
#   sudo mosquitto_passwd    /etc/mosquitto/passwd homeassistant

# ────────────────────────────────────────────────────────────
# 3. /etc/mosquitto/conf.d/extractor.conf   ← copia esto
# ────────────────────────────────────────────────────────────

listener 1883

# Sin TLS — la seguridad viene del firewall (ver paso 5)
allow_anonymous false
password_file /etc/mosquitto/passwd

# Logging
log_dest file /var/log/mosquitto/mosquitto.log
log_type error
log_type warning

# ────────────────────────────────────────────────────────────
# 4. FIREWALL VPS  ← la clave de seguridad sin TLS
# ────────────────────────────────────────────────────────────
# Opción A – IPs fijas (lo más seguro):
#   sudo ufw allow from IP_DE_CASA    to any port 1883
#   sudo ufw allow from IP_DEL_VPS_HA to any port 1883
#   sudo ufw deny 1883
#
# Opción B – IP dinámica en casa (menos seguro pero práctico):
#   sudo ufw allow 1883/tcp   # abierto al mundo, protegido solo por user/pass
#   # Complementar con fail2ban para bloquear ataques de fuerza bruta
#
# Opción C – WireGuard (cifrado real sin TLS en el ESP):
#   Instalar WireGuard en el VPS y en el router de casa.
#   El tráfico MQTT viaja dentro del túnel cifrado.
#   El ESP no necesita saber nada de cifrado → solución ideal.
#
#   sudo ufw allow 51820/udp   # puerto WireGuard

# ────────────────────────────────────────────────────────────
# 5. FAIL2BAN para MQTT (opcional pero recomendado con opción B)
# ────────────────────────────────────────────────────────────
#   sudo apt install -y fail2ban
#   Crear /etc/fail2ban/filter.d/mosquitto.conf:
#     [Definition]
#     failregex = .*New connection from <HOST>.*Connection Refused.*
#
#   Crear /etc/fail2ban/jail.d/mosquitto.conf:
#     [mosquitto]
#     enabled  = true
#     port     = 1883
#     filter   = mosquitto
#     logpath  = /var/log/mosquitto/mosquitto.log
#     maxretry = 5
#     bantime  = 3600

# ────────────────────────────────────────────────────────────
# 6. PARÁMETROS A CAMBIAR EN EL ESP (portal WiFiManager)
# ────────────────────────────────────────────────────────────
#   MQTT Host : IP o dominio del VPS
#   MQTT Port : 1883
#   MQTT User : esp_extractor
#   MQTT Pass : la que elegiste

# ────────────────────────────────────────────────────────────
# 7. PARÁMETROS HOME ASSISTANT (Ajustes → Integraciones → MQTT)
# ────────────────────────────────────────────────────────────
#   Broker   : IP o dominio del VPS
#   Puerto   : 1883
#   Usuario  : homeassistant
#   Contraseña: la que elegiste
#   (dejar TLS desactivado)

# ────────────────────────────────────────────────────────────
# 8. VERIFICAR DESDE TU MÁQUINA
# ────────────────────────────────────────────────────────────
#   mosquitto_sub -h IP_VPS -p 1883 \
#     -u homeassistant -P TU_PASS \
#     -t "extractor/#" -v
